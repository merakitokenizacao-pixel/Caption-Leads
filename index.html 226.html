<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#000000" />
<title>Meraki CRM — Lead Prospector</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  /* ============ DESIGN TOKENS ============ */
  :root {
    /* Backgrounds — preto verdadeiro com camadas mais sutis */
    --bg: #000000;
    --surface: #0A0A0A;
    --surface-2: #111111;
    --surface-3: #161616;
    --surface-4: #1C1C1C;

    /* Borders — bem sutis */
    --border: #1F1F1F;
    --border-strong: #2A2A2A;
    --border-bright: #3A3A3A;

    /* Text — alta hierarquia */
    --text: #FAFAFA;
    --text-muted: #888888;
    --text-subtle: #555555;
    --text-faint: #333333;

    /* Acento principal: branco puro (estilo editorial) */
    --accent: #FFFFFF;
    --accent-soft: #E5E5E5;
    --accent-glow: rgba(255, 255, 255, 0.06);

    /* Status (cores funcionais necessárias) */
    --status-new: #71717A;
    --status-contacted: #60A5FA;
    --status-qualified: #F59E0B;
    --status-meeting: #A78BFA;
    --status-converted: #10B981;
    --status-lost: #EF4444;
    --status-disqualified: #52525B;

    /* Score */
    --score-hot: #10B981;
    --score-warm: #60A5FA;
    --score-mild: #F59E0B;
    --score-cold: #71717A;

    /* Feedback */
    --danger: #EF4444;
    --success: #10B981;
    --warning: #F59E0B;

    /* Radii — mais quadrado, menos rounded */
    --radius: 4px;
    --radius-sm: 3px;
    --radius-lg: 6px;
    --radius-xl: 8px;

    /* Shadows */
    --shadow: 0 4px 20px rgba(0,0,0,0.6);
    --shadow-strong: 0 16px 60px rgba(0,0,0,0.8);

    /* Transition */
    --transition: 120ms cubic-bezier(0.4, 0, 0.2, 1);

    /* Fonts */
    --font-sans: 'Inter', sans-serif;
    --font-display: 'Space Grotesk', sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-sans);
    font-size: 13px;
    line-height: 1.5;
    font-feature-settings: 'cv11', 'ss01', 'ss03';
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    height: 100vh;
    overflow: hidden;
    letter-spacing: -0.005em;
  }

  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 0; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-subtle); }

  ::selection { background: var(--accent); color: var(--bg); }

  button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
  input, select, textarea { font-family: inherit; color: inherit; }
  a { color: var(--accent); text-decoration: none; }
  a:hover { color: var(--accent-soft); }

  .mono { font-family: var(--font-mono); font-feature-settings: 'zero', 'ss01'; }
  .display { font-family: var(--font-display); letter-spacing: -0.025em; }

  /* ============ LAYOUT ============ */
  .app {
    display: grid;
    grid-template-columns: 220px 1fr;
    height: 100vh;
  }

  .sidebar {
    background: var(--bg);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 28px 16px 20px;
    position: relative;
  }

  /* Brand: só wordmark, sem quadrado */
  .brand {
    padding: 0 6px 28px;
    margin-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }
  .brand-name {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 20px;
    letter-spacing: -0.04em;
    color: var(--text);
    line-height: 1;
  }
  .brand-tag {
    display: block;
    font-family: var(--font-mono);
    font-size: 9.5px;
    color: var(--text-subtle);
    text-transform: uppercase;
    letter-spacing: 0.18em;
    margin-top: 6px;
    font-weight: 500;
  }

  .nav {
    display: flex;
    flex-direction: column;
    gap: 1px;
  }
  .nav-section-title {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-subtle);
    text-transform: uppercase;
    letter-spacing: 0.16em;
    padding: 22px 8px 8px;
    font-weight: 500;
  }
  .nav-section-title::before {
    content: '/// ';
    color: var(--text-faint);
  }
  .nav-link {
    display: flex;
    align-items: center;
    gap: 11px;
    padding: 8px 10px;
    border-radius: var(--radius);
    color: var(--text-muted);
    cursor: pointer;
    transition: background var(--transition), color var(--transition);
    font-weight: 500;
    font-size: 13px;
    position: relative;
    letter-spacing: -0.01em;
  }
  .nav-link:hover {
    background: var(--surface-2);
    color: var(--text);
  }
  .nav-link.active {
    background: var(--surface-3);
    color: var(--text);
  }
  .nav-link.active::before {
    content: '';
    position: absolute;
    left: -16px;
    top: 50%;
    transform: translateY(-50%);
    width: 2px;
    height: 16px;
    background: var(--accent);
  }
  .nav-link svg { width: 15px; height: 15px; flex-shrink: 0; opacity: 0.85; }

  .sidebar-footer {
    margin-top: auto;
    padding-top: 16px;
    border-top: 1px solid var(--border);
  }

  /* ============ MAIN ============ */
  .main {
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--bg);
  }

  .topbar {
    height: 56px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    display: flex;
    align-items: center;
    padding: 0 28px;
    gap: 16px;
    flex-shrink: 0;
  }
  .topbar h1 {
    font-family: var(--font-display);
    font-size: 18px;
    font-weight: 600;
    letter-spacing: -0.025em;
    color: var(--text);
  }
  .topbar-actions {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .content {
    flex: 1;
    overflow: auto;
    padding: 32px;
  }

  /* ============ COMPONENTS ============ */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 14px;
    border-radius: var(--radius);
    font-weight: 500;
    font-size: 12.5px;
    transition: all var(--transition);
    border: 1px solid transparent;
    letter-spacing: -0.005em;
    line-height: 1.2;
  }
  .btn-primary {
    background: var(--accent);
    color: var(--bg);
    font-weight: 600;
  }
  .btn-primary:hover {
    background: var(--accent-soft);
  }
  .btn-secondary {
    background: var(--surface-2);
    border-color: var(--border-strong);
    color: var(--text);
  }
  .btn-secondary:hover {
    background: var(--surface-3);
    border-color: var(--border-bright);
  }
  .btn-ghost {
    color: var(--text-muted);
  }
  .btn-ghost:hover { background: var(--surface-2); color: var(--text); }
  .btn-danger {
    background: transparent;
    border-color: rgba(239, 68, 68, 0.4);
    color: var(--danger);
  }
  .btn-danger:hover { background: rgba(239, 68, 68, 0.08); border-color: var(--danger); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .input, .select, .textarea {
    width: 100%;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 9px 12px;
    color: var(--text);
    font-size: 13px;
    transition: border-color var(--transition), background var(--transition);
    letter-spacing: -0.005em;
  }
  .input:focus, .select:focus, .textarea:focus {
    outline: none;
    border-color: var(--border-bright);
    background: var(--surface-3);
  }
  .input::placeholder { color: var(--text-subtle); }
  .textarea { resize: vertical; min-height: 80px; line-height: 1.55; }

  .label {
    display: block;
    font-size: 11.5px;
    font-weight: 500;
    color: var(--text-muted);
    margin-bottom: 7px;
    letter-spacing: 0.01em;
  }

  .field { margin-bottom: 16px; }
  .field-help {
    font-size: 11px;
    color: var(--text-subtle);
    margin-top: 6px;
    line-height: 1.4;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 22px;
  }

  /* Status badges - mais editorial */
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 3px 9px;
    border-radius: 999px;
    font-size: 10.5px;
    font-weight: 500;
    background: var(--surface-3);
    border: 1px solid var(--border);
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    font-family: var(--font-mono);
  }
  .badge-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: currentColor;
  }

  .badge.status-new { color: var(--status-new); }
  .badge.status-contacted { color: var(--status-contacted); border-color: rgba(96,165,250,0.25); }
  .badge.status-qualified { color: var(--status-qualified); border-color: rgba(245,158,11,0.25); }
  .badge.status-meeting_scheduled { color: var(--status-meeting); border-color: rgba(167,139,250,0.25); }
  .badge.status-converted { color: var(--status-converted); border-color: rgba(16,185,129,0.25); }
  .badge.status-lost { color: var(--status-lost); border-color: rgba(239,68,68,0.25); }
  .badge.status-disqualified { color: var(--status-disqualified); }

  /* Loading */
  .spinner {
    width: 14px; height: 14px;
    border: 1.5px solid var(--border-strong);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.5s linear infinite;
    display: inline-block;
  }
  .spinner-lg { width: 28px; height: 28px; border-width: 2px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-state, .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 20px;
    color: var(--text-subtle);
    gap: 14px;
  }
  .empty-state-icon {
    width: 44px;
    height: 44px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-muted);
  }
  .empty-state-title {
    font-family: var(--font-display);
    font-size: 16px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -0.02em;
  }
  .empty-state-desc {
    font-size: 13px;
    text-align: center;
    max-width: 380px;
    line-height: 1.55;
  }

  /* ============ DASHBOARD ============ */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
    margin-bottom: 32px;
  }
  .stat-card {
    background: var(--bg);
    padding: 22px 24px;
    position: relative;
    transition: background var(--transition);
  }
  .stat-card:hover {
    background: var(--surface);
  }
  .stat-index {
    position: absolute;
    top: 18px;
    right: 22px;
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-faint);
    letter-spacing: 0.08em;
  }
  .stat-label {
    font-family: var(--font-mono);
    font-size: 10.5px;
    color: var(--text-muted);
    font-weight: 500;
    margin-bottom: 16px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
  }
  .stat-value {
    font-family: var(--font-display);
    font-size: 38px;
    font-weight: 600;
    letter-spacing: -0.04em;
    line-height: 1;
    color: var(--text);
  }
  .stat-meta {
    font-size: 11.5px;
    color: var(--text-subtle);
    margin-top: 10px;
    letter-spacing: -0.005em;
  }

  .panel-title {
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 500;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.14em;
    margin-bottom: 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .panel-title::before {
    content: '/// ';
    color: var(--text-faint);
  }

  .funnel {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .funnel-row {
    display: grid;
    grid-template-columns: 140px 1fr 50px;
    align-items: center;
    gap: 14px;
    padding: 6px 0;
  }
  .funnel-label {
    font-size: 12.5px;
    color: var(--text-muted);
    font-weight: 500;
    letter-spacing: -0.005em;
  }
  .funnel-bar {
    background: var(--surface-2);
    height: 24px;
    border-radius: 2px;
    overflow: hidden;
    position: relative;
  }
  .funnel-bar-fill {
    height: 100%;
    background: var(--text);
    transition: width 600ms cubic-bezier(0.4, 0, 0.2, 1);
  }
  .funnel-count {
    font-family: var(--font-mono);
    font-weight: 500;
    text-align: right;
    font-size: 12.5px;
    color: var(--text);
  }

  /* ============ LEADS TABLE ============ */
  .filters {
    display: flex;
    gap: 8px;
    margin-bottom: 18px;
    flex-wrap: wrap;
    align-items: center;
  }
  .filters .input,
  .filters .select {
    width: auto;
    min-width: 160px;
  }
  .filters .input-search {
    flex: 1;
    min-width: 240px;
    padding-left: 36px;
    background-image: url("data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='%23888888' stroke-width='2'%3E%3Ccircle cx='11' cy='11' r='8'/%3E%3Cpath d='m21 21-4.35-4.35'/%3E%3C/svg%3E");
    background-repeat: no-repeat;
    background-position: 12px center;
  }

  .table-wrapper {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
  }
  .table {
    width: 100%;
    border-collapse: collapse;
  }
  .table th {
    text-align: left;
    padding: 11px 18px;
    background: var(--surface);
    color: var(--text-muted);
    font-size: 10.5px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
    font-family: var(--font-mono);
  }
  .table td {
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
    vertical-align: middle;
  }
  .table tr:last-child td { border-bottom: none; }
  .table tr.row-clickable { cursor: pointer; transition: background var(--transition); }
  .table tr.row-clickable:hover { background: var(--surface); }

  .lead-name {
    font-weight: 600;
    color: var(--text);
    letter-spacing: -0.01em;
  }
  .lead-category {
    color: var(--text-subtle);
    font-size: 11.5px;
    margin-top: 3px;
    letter-spacing: -0.005em;
  }

  .rating-pill {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 2px 9px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 999px;
    font-size: 11.5px;
    font-weight: 500;
    font-family: var(--font-mono);
  }
  .rating-pill svg { color: var(--status-qualified); }

  .pagination {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 18px;
    background: var(--surface);
    border-top: 1px solid var(--border);
  }
  .pagination-info {
    color: var(--text-muted);
    font-size: 11.5px;
    font-family: var(--font-mono);
  }
  .pagination-controls {
    display: flex;
    gap: 6px;
  }

  /* Status select inline */
  .status-select {
    appearance: none;
    -webkit-appearance: none;
    background: var(--surface-2);
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 4px 26px 4px 10px;
    border-radius: 999px;
    font-size: 10.5px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    cursor: pointer;
    font-family: var(--font-mono);
    background-image: url("data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='10' height='10' viewBox='0 0 24 24' fill='none' stroke='%23888888' stroke-width='2'%3E%3Cpolyline points='6 9 12 15 18 9'/%3E%3C/svg%3E");
    background-repeat: no-repeat;
    background-position: right 8px center;
    transition: all var(--transition);
  }
  .status-select:hover { border-color: var(--border-bright); }

  /* ============ KANBAN ============ */
  .kanban {
    display: grid;
    grid-template-columns: repeat(5, minmax(260px, 1fr));
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
    height: calc(100vh - 56px - 56px);
    overflow-x: auto;
  }
  .kanban-column {
    background: var(--bg);
    display: flex;
    flex-direction: column;
    min-width: 260px;
  }
  .kanban-header {
    padding: 14px 14px 12px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: var(--surface);
  }
  .kanban-title {
    font-family: var(--font-mono);
    font-size: 10.5px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    display: flex;
    align-items: center;
    gap: 7px;
  }
  .kanban-count {
    font-family: var(--font-mono);
    font-size: 10.5px;
    color: var(--text-subtle);
    background: var(--bg);
    padding: 2px 7px;
    border-radius: 2px;
    border: 1px solid var(--border);
  }
  .kanban-cards {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    min-height: 100px;
  }
  .kanban-cards.drop-target {
    background: var(--surface-2);
  }
  .kanban-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 13px;
    cursor: grab;
    transition: all var(--transition);
  }
  .kanban-card:hover {
    border-color: var(--border-bright);
    background: var(--surface-2);
  }
  .kanban-card.dragging {
    opacity: 0.4;
    cursor: grabbing;
  }
  .kanban-card-name {
    font-weight: 600;
    font-size: 12.5px;
    margin-bottom: 5px;
    letter-spacing: -0.01em;
  }
  .kanban-card-meta {
    font-size: 11px;
    color: var(--text-subtle);
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    align-items: center;
  }
  .kanban-card-meta span { display: inline-flex; align-items: center; gap: 3px; }

  /* ============ NEW SEARCH ============ */
  .form-grid {
    display: grid;
    grid-template-columns: 1fr 360px;
    gap: 24px;
  }
  @media (max-width: 1100px) { .form-grid { grid-template-columns: 1fr; } }

  .slider-row {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .slider-row input[type="range"] {
    flex: 1;
    accent-color: var(--accent);
  }
  .slider-value {
    font-family: var(--font-mono);
    font-size: 13px;
    font-weight: 500;
    background: var(--surface-2);
    padding: 5px 12px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    min-width: 56px;
    text-align: center;
  }

  .search-history-row {
    padding: 14px 0;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    transition: background var(--transition);
  }
  .search-history-row:last-child { border-bottom: none; }
  .search-history-info { flex: 1; min-width: 0; }
  .search-history-query {
    font-weight: 600;
    font-size: 13px;
    margin-bottom: 3px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    letter-spacing: -0.01em;
  }
  .search-history-meta {
    font-size: 11px;
    color: var(--text-subtle);
    font-family: var(--font-mono);
  }

  /* ============ DRAWER ============ */
  .drawer-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(2px);
    z-index: 100;
    opacity: 0;
    pointer-events: none;
    transition: opacity 200ms;
  }
  .drawer-overlay.open { opacity: 1; pointer-events: auto; }

  .drawer {
    position: fixed;
    top: 0; right: 0;
    width: 560px;
    max-width: 100vw;
    height: 100vh;
    background: var(--bg);
    border-left: 1px solid var(--border);
    z-index: 101;
    transform: translateX(100%);
    transition: transform 240ms cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: var(--shadow-strong);
    display: flex;
    flex-direction: column;
  }
  .drawer.open { transform: translateX(0); }
  .drawer-header {
    padding: 24px 28px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 16px;
  }
  .drawer-title {
    font-family: var(--font-display);
    font-size: 20px;
    font-weight: 600;
    letter-spacing: -0.025em;
    margin-bottom: 8px;
    line-height: 1.2;
  }
  .drawer-close {
    width: 28px; height: 28px;
    border-radius: var(--radius-sm);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-muted);
    transition: all var(--transition);
    flex-shrink: 0;
  }
  .drawer-close:hover { background: var(--surface-2); color: var(--text); }

  .drawer-tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
    padding: 0 16px;
  }
  .drawer-tab {
    padding: 12px 14px;
    color: var(--text-muted);
    font-size: 12.5px;
    font-weight: 500;
    border-bottom: 1.5px solid transparent;
    transition: all var(--transition);
    letter-spacing: -0.005em;
  }
  .drawer-tab:hover { color: var(--text); }
  .drawer-tab.active {
    color: var(--text);
    border-bottom-color: var(--accent);
  }

  .drawer-body {
    flex: 1;
    overflow-y: auto;
    padding: 24px 28px;
  }

  .info-row {
    display: grid;
    grid-template-columns: 110px 1fr;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    gap: 14px;
    align-items: start;
  }
  .info-row:last-child { border-bottom: none; }
  .info-label {
    font-family: var(--font-mono);
    font-size: 10.5px;
    color: var(--text-subtle);
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }
  .info-value {
    font-size: 13px;
    word-break: break-word;
    letter-spacing: -0.005em;
  }
  .info-value.empty { color: var(--text-subtle); font-style: italic; }

  .interaction {
    padding: 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 8px;
  }
  .interaction-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }
  .interaction-type {
    font-family: var(--font-mono);
    font-size: 10px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--text-muted);
  }
  .interaction-time {
    font-family: var(--font-mono);
    font-size: 10.5px;
    color: var(--text-subtle);
  }
  .interaction-content {
    font-size: 13px;
    color: var(--text);
    white-space: pre-wrap;
    line-height: 1.55;
  }

  /* Toast */
  .toast-container {
    position: fixed;
    bottom: 24px;
    right: 24px;
    z-index: 200;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .toast {
    background: var(--surface-3);
    border: 1px solid var(--border-strong);
    border-radius: var(--radius);
    padding: 12px 16px;
    box-shadow: var(--shadow);
    display: flex;
    align-items: center;
    gap: 10px;
    min-width: 280px;
    max-width: 400px;
    animation: slideInRight 200ms cubic-bezier(0.4, 0, 0.2, 1);
  }
  .toast.success { border-left: 2px solid var(--success); }
  .toast.error { border-left: 2px solid var(--danger); }
  .toast.info { border-left: 2px solid var(--accent); }
  .toast-message {
    font-size: 13px;
    font-weight: 500;
    letter-spacing: -0.005em;
  }
  @keyframes slideInRight {
    from { transform: translateX(20px); opacity: 0; }
    to { transform: translateX(0); opacity: 1; }
  }

  /* Setup screen */
  .setup-screen {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 300;
    padding: 20px;
  }
  .setup-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 36px;
    max-width: 540px;
    width: 100%;
  }
  .setup-card h2 {
    font-family: var(--font-display);
    font-size: 26px;
    font-weight: 600;
    letter-spacing: -0.03em;
    margin-bottom: 8px;
  }
  .setup-card .subtitle {
    color: var(--text-muted);
    margin-bottom: 28px;
    font-size: 13.5px;
    line-height: 1.55;
  }

  /* Animations */
  .fade-in {
    animation: fadeIn 300ms ease-out;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ============ AI INSIGHTS / SCORE ============ */
  .score-pill {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 3px 9px;
    border-radius: 2px;
    font-family: var(--font-mono);
    font-weight: 500;
    font-size: 11.5px;
    border: 1px solid;
    min-width: 44px;
    justify-content: center;
    letter-spacing: 0.02em;
  }
  .score-hot   { background: rgba(16,185,129,0.08); color: var(--score-hot); border-color: rgba(16,185,129,0.25); }
  .score-warm  { background: rgba(96,165,250,0.08); color: var(--score-warm); border-color: rgba(96,165,250,0.25); }
  .score-mild  { background: rgba(245,158,11,0.08); color: var(--score-mild); border-color: rgba(245,158,11,0.25); }
  .score-cold  { background: var(--surface-2); color: var(--text-muted); border-color: var(--border); }
  .score-none  { color: var(--text-faint); font-size: 11px; font-weight: 500; font-family: var(--font-mono); }

  .score-bar {
    background: var(--surface-2);
    border-radius: 0;
    height: 4px;
    overflow: hidden;
    width: 100%;
  }
  .score-bar-fill {
    height: 100%;
    transition: width 600ms cubic-bezier(0.4, 0, 0.2, 1);
  }

  .insights-section {
    margin-bottom: 24px;
  }
  .insights-section-title {
    font-family: var(--font-mono);
    font-size: 10.5px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--text-muted);
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .insights-section-title::before {
    content: '/// ';
    color: var(--text-faint);
  }
  .insights-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
  }
  .insights-score-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 22px;
    margin-bottom: 24px;
    position: relative;
  }
  .insights-score-card::before {
    content: '[01]';
    position: absolute;
    top: 18px;
    right: 22px;
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-faint);
    letter-spacing: 0.08em;
  }
  .insights-score-row {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    margin-bottom: 16px;
  }
  .insights-score-big {
    font-family: var(--font-display);
    font-size: 48px;
    font-weight: 600;
    letter-spacing: -0.04em;
    line-height: 1;
  }
  .insights-score-label {
    font-family: var(--font-mono);
    font-size: 10.5px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.14em;
    font-weight: 500;
    margin-bottom: 8px;
  }
  .insights-meta-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 16px;
  }
  .meta-tag {
    background: var(--surface-2);
    border: 1px solid var(--border);
    padding: 3px 9px;
    border-radius: 2px;
    font-size: 10.5px;
    color: var(--text-muted);
    font-weight: 500;
    font-family: var(--font-mono);
    letter-spacing: 0.02em;
  }
  .meta-tag-strong {
    background: var(--text);
    border-color: var(--text);
    color: var(--bg);
  }

  .bullet-list {
    list-style: none;
    padding: 0;
    margin: 0;
  }
  .bullet-list li {
    display: flex;
    gap: 12px;
    padding: 10px 0;
    font-size: 13px;
    line-height: 1.55;
    border-bottom: 1px solid var(--border);
    color: var(--text);
    letter-spacing: -0.005em;
  }
  .bullet-list li:last-child { border-bottom: none; }
  .bullet-list li::before {
    content: '—';
    color: var(--text-subtle);
    flex-shrink: 0;
    font-family: var(--font-mono);
  }
  .bullet-list.hooks li::before { color: var(--score-hot); }
  .bullet-list.flags li::before { color: var(--danger); }

  .qualify-btn {
    background: var(--accent);
    color: var(--bg);
    padding: 10px 16px;
    border-radius: var(--radius);
    font-weight: 600;
    font-size: 12.5px;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    transition: all var(--transition);
    letter-spacing: -0.005em;
  }
  .qualify-btn:hover { background: var(--accent-soft); }
  .qualify-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .ai-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: transparent;
    border: 1px solid var(--border-strong);
    color: var(--text-muted);
    padding: 2px 7px;
    border-radius: 2px;
    font-size: 9.5px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.16em;
    font-family: var(--font-mono);
  }

  /* ============ CONVERSATION / VARIANTS ============ */
  .variant-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px;
    margin-bottom: 12px;
    transition: all var(--transition);
  }
  .variant-card:hover {
    border-color: var(--border-strong);
  }
  .variant-card.selected {
    border-color: var(--accent);
  }
  .variant-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
    gap: 10px;
  }
  .variant-label {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: transparent;
    border: 1px solid var(--border-strong);
    padding: 3px 9px;
    border-radius: 2px;
    font-size: 10px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--text);
    font-family: var(--font-mono);
  }
  .variant-message {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    font-size: 13.5px;
    line-height: 1.65;
    white-space: pre-wrap;
    color: var(--text);
    margin-bottom: 12px;
    font-family: inherit;
    letter-spacing: -0.005em;
  }
  .variant-message-edit {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--accent);
    border-radius: var(--radius);
    padding: 14px 16px;
    font-size: 13.5px;
    line-height: 1.65;
    color: var(--text);
    font-family: inherit;
    resize: vertical;
    min-height: 100px;
  }
  .variant-actions {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  /* ============ CHAT BUBBLES ============ */
  .chat-container {
    display: flex;
    flex-direction: column;
    gap: 10px;
    padding: 8px 0;
  }
  .chat-bubble {
    max-width: 82%;
    padding: 10px 14px;
    border-radius: var(--radius);
    font-size: 13px;
    line-height: 1.55;
    white-space: pre-wrap;
    word-wrap: break-word;
    position: relative;
    letter-spacing: -0.005em;
  }
  .chat-bubble.outbound {
    align-self: flex-end;
    background: var(--text);
    color: var(--bg);
    border-bottom-right-radius: 2px;
  }
  .chat-bubble.inbound {
    align-self: flex-start;
    background: var(--surface-2);
    color: var(--text);
    border-bottom-left-radius: 2px;
    border: 1px solid var(--border);
  }
  .chat-bubble.draft {
    background: var(--surface);
    border: 1px dashed var(--border-strong);
    color: var(--text-muted);
  }
  .chat-bubble-meta {
    font-size: 10px;
    opacity: 0.7;
    margin-top: 5px;
    display: flex;
    align-items: center;
    gap: 5px;
    justify-content: flex-end;
    font-family: var(--font-mono);
  }
  .chat-bubble.inbound .chat-bubble-meta { justify-content: flex-start; }

  .msg-status-pill {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 1px 6px;
    border-radius: 2px;
    font-size: 9px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    font-family: var(--font-mono);
  }
  .msg-status-draft { background: rgba(113,113,122,0.15); color: var(--text-muted); border: 1px solid var(--border); }
  .msg-status-approved { background: rgba(245,158,11,0.12); color: var(--status-qualified); border: 1px solid rgba(245,158,11,0.3); }
  .msg-status-sent { background: rgba(96,165,250,0.12); color: var(--status-contacted); border: 1px solid rgba(96,165,250,0.3); }
  .msg-status-delivered, .msg-status-read { background: rgba(16,185,129,0.12); color: var(--success); border: 1px solid rgba(16,185,129,0.3); }
  .msg-status-failed { background: rgba(239,68,68,0.12); color: var(--danger); border: 1px solid rgba(239,68,68,0.3); }

  /* ============ APPROVAL PAGE ============ */
  .approval-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 22px;
    margin-bottom: 14px;
    transition: all var(--transition);
  }
  .approval-card:hover {
    border-color: var(--border-strong);
  }
  .approval-card-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 14px;
    gap: 12px;
  }
  .approval-card-title {
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 17px;
    margin-bottom: 6px;
    letter-spacing: -0.02em;
  }
  .approval-card-meta {
    font-size: 11.5px;
    color: var(--text-subtle);
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
    font-family: var(--font-mono);
  }
  .approval-variants-grid {
    display: grid;
    gap: 10px;
  }

  /* ============================================
     MOBILE RESPONSIVE — breakpoint 900px
     ============================================ */

  /* Mobile menu toggle (escondido em desktop) */
  .mobile-menu-btn {
    display: none;
    width: 36px;
    height: 36px;
    align-items: center;
    justify-content: center;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    background: var(--surface);
    transition: all var(--transition);
  }
  .mobile-menu-btn:hover { background: var(--surface-2); }
  .mobile-menu-btn svg { width: 18px; height: 18px; }

  .sidebar-backdrop {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.6);
    backdrop-filter: blur(2px);
    z-index: 90;
    opacity: 0;
    pointer-events: none;
    transition: opacity 200ms;
  }
  .sidebar-backdrop.open {
    opacity: 1;
    pointer-events: auto;
  }

  @media (max-width: 900px) {
    /* === LAYOUT === */
    html, body {
      font-size: 14px;
    }

    .app {
      grid-template-columns: 1fr;
    }

    /* Sidebar vira drawer lateral */
    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      width: 260px;
      height: 100vh;
      z-index: 95;
      transform: translateX(-100%);
      transition: transform 240ms cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: var(--shadow-strong);
    }
    .sidebar.open {
      transform: translateX(0);
    }

    .sidebar-backdrop { display: block; }

    /* Mobile menu button visível */
    .mobile-menu-btn { display: inline-flex; }

    /* Topbar ajustada */
    .topbar {
      padding: 0 16px;
      gap: 12px;
      height: 56px;
    }
    .topbar h1 {
      font-size: 16px;
    }

    .content {
      padding: 18px 16px;
    }

    /* === DASHBOARD === */
    .stats-grid {
      grid-template-columns: 1fr 1fr;
    }
    .stat-card {
      padding: 16px 18px;
    }
    .stat-value {
      font-size: 30px;
    }
    .stat-index {
      top: 14px;
      right: 16px;
    }
    .stat-meta {
      font-size: 11px;
    }

    /* Dashboard: stack vertical dos 2 painéis */
    .content > div[style*="grid-template-columns: 1fr 1fr"] {
      grid-template-columns: 1fr !important;
      gap: 16px !important;
    }

    /* === LEADS TABLE → CARDS === */
    .filters {
      gap: 8px;
    }
    .filters .input,
    .filters .select {
      width: 100%;
      min-width: 0;
    }
    .filters .input-search {
      flex: 1 1 100%;
      min-width: 0;
    }

    /* Esconde a tabela e mostra cards */
    .table-wrapper {
      border: none;
      background: transparent;
      border-radius: 0;
    }
    .table thead { display: none; }
    .table, .table tbody, .table tr, .table td {
      display: block;
    }
    .table tr.row-clickable {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      margin-bottom: 10px;
      padding: 14px 16px;
      position: relative;
    }
    .table tr.row-clickable:hover {
      background: var(--surface-2);
    }
    .table td {
      border: none;
      padding: 4px 0;
      font-size: 13px;
    }
    /* Score badge no canto superior direito do card */
    .table td:first-child {
      position: absolute;
      top: 14px;
      right: 16px;
      padding: 0;
    }
    /* Lead name e categoria */
    .table td:nth-child(2) {
      padding-right: 60px;
      padding-bottom: 8px;
    }
    /* Cidade, telefone, rating, status, data inline */
    .table td:nth-child(3),
    .table td:nth-child(4),
    .table td:nth-child(5),
    .table td:nth-child(6),
    .table td:nth-child(7) {
      display: inline-flex;
      margin-right: 10px;
      margin-top: 4px;
      padding: 0;
      font-size: 11.5px;
      color: var(--text-muted);
    }
    .table td:nth-child(7) {
      display: block;
      margin-top: 8px;
      font-size: 10.5px;
      color: var(--text-subtle);
      font-family: var(--font-mono);
    }
    .pagination {
      flex-direction: column;
      gap: 10px;
      padding: 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      margin-top: 8px;
    }
    .pagination-info {
      text-align: center;
    }

    /* === KANBAN: scroll horizontal === */
    .kanban {
      grid-auto-flow: column;
      grid-auto-columns: 80vw;
      grid-template-columns: none;
      height: calc(100vh - 56px - 36px);
      gap: 1px;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
    }
    .kanban-column {
      scroll-snap-align: start;
      min-width: 0;
    }

    /* === DRAWER: tela inteira === */
    .drawer {
      width: 100vw;
    }
    .drawer-header {
      padding: 18px 20px;
    }
    .drawer-title {
      font-size: 18px;
    }
    .drawer-body {
      padding: 18px 20px;
    }
    .drawer-tabs {
      padding: 0 8px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    .drawer-tab {
      padding: 12px 12px;
      font-size: 12px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .info-row {
      grid-template-columns: 1fr;
      gap: 4px;
      padding: 12px 0;
    }
    .info-label {
      font-size: 10px;
    }

    /* === NEW SEARCH: stack === */
    .form-grid {
      grid-template-columns: 1fr;
    }

    /* === APPROVAL CARDS === */
    .approval-card {
      padding: 16px;
    }
    .approval-card-header {
      flex-direction: column;
      align-items: flex-start;
    }
    .variant-card {
      padding: 14px;
    }
    .variant-actions {
      flex-direction: column;
      align-items: stretch;
    }
    .variant-actions .btn {
      width: 100%;
      justify-content: center;
    }

    /* === TOAST === */
    .toast-container {
      bottom: 16px;
      right: 16px;
      left: 16px;
    }
    .toast {
      min-width: 0;
      max-width: 100%;
    }

    /* === SETUP === */
    .setup-card {
      padding: 24px;
    }
    .setup-card h2 {

async function sb(method, path, body) {
  if (!config) throw new Error('Configuração não definida');
  const url = `${config.supabaseUrl.replace(/\/$/, '')}/rest/v1${path}`;
  const headers = {
    'apikey': config.supabaseAnonKey,
    'Authorization': `Bearer ${config.supabaseAnonKey}`,
    'Content-Type': 'application/json',
    'Prefer': method === 'POST' ? 'return=representation' :
              method === 'PATCH' ? 'return=representation' : undefined,
  };
  Object.keys(headers).forEach(k => headers[k] === undefined && delete headers[k]);
  const res = await fetch(url, {
    method, headers,
    body: body ? JSON.stringify(body) : undefined,
  });
  if (!res.ok) {
    const text = await res.text();
    throw new Error(`Supabase ${res.status}: ${text}`);
  }
  if (res.status === 204) return null;
  return res.json();
}

/* ============================================

   ============================================ */
function toast(message, type = 'info') {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.innerHTML = `<div class="toast-message">${escapeHtml(message)}</div>`;
  document.getElementById('toasts').appendChild(el);
  setTimeout(() => {
    el.style.opacity = '0';
    el.style.transition = 'opacity 200ms';
    setTimeout(() => el.remove(), 200);
  }, 3500);
}

function escapeHtml(s) {
  if (s == null) return '';
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
}

function fmtDate(d) {
  if (!d) return '—';
  const date = new Date(d);
  return date.toLocaleDateString('pt-BR', { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' });
}

function fmtPhone(p) {
  if (!p) return '';
  return p.replace(/^\+55\s?/, '');
}

function statusLabel(s) {
  return STATUSES.find(x => x.value === s)?.label || s;
}

function scoreClass(score) {
  if (score == null) return 'score-none';
  if (score >= 80) return 'score-hot';
  if (score >= 60) return 'score-warm';
  if (score >= 40) return 'score-mild';
  return 'score-cold';
}

function scoreColor(score) {
  if (score == null) return 'var(--text-subtle)';
  if (score >= 80) return '#10B981';
  if (score >= 60) return 'var(--accent)';
  if (score >= 40) return 'var(--status-qualified)';
  return 'var(--text-muted)';
}

function renderScorePill(score) {
  if (score == null) return '<span class="score-none">—</span>';
  return `<span class="score-pill ${scoreClass(score)}">${score}</span>`;
}

function sizeLabel(s) {
  return ({ small: 'Pequena', medium: 'Média', large: 'Grande' })[s] || s || '—';
}

function maturityLabel(m) {
  return ({ low: 'Maturidade baixa', medium: 'Maturidade média', high: 'Maturidade alta' })[m] || m || '—';
}

function renderLeadsTable() {
  const cities = [...new Set(leadsCache.map(l => l.city).filter(Boolean))].sort();
  const categories = [...new Set(leadsCache.map(l => l.category).filter(Boolean))].sort();

  let filtered = leadsCache.filter(l => {
    if (leadsState.search) {
      const q = leadsState.search.toLowerCase();
      const hay = `${l.name||''} ${l.address||''} ${l.phone||''} ${l.website||''}`.toLowerCase();
      if (!hay.includes(q)) return false;
    }
    if (leadsState.city && l.city !== leadsState.city) return false;
    if (leadsState.category && l.category !== leadsState.category) return false;
    if (leadsState.status && l.status !== leadsState.status) return false;
    return true;
  });

  // Sort
  if (leadsState.sortBy === 'score') {
    filtered.sort((a, b) => (b.last_score ?? -1) - (a.last_score ?? -1));
  } else {
    filtered.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
  }

  const total = filtered.length;
  const totalPages = Math.max(1, Math.ceil(total / leadsState.pageSize));
  if (leadsState.page > totalPages) leadsState.page = totalPages;
  const start = (leadsState.page - 1) * leadsState.pageSize;
  const pageItems = filtered.slice(start, start + leadsState.pageSize);

  const filtersHtml = `
    <div class="filters">
      <input class="input input-search" placeholder="Buscar por nome, endereço, telefone..." value="${escapeHtml(leadsState.search)}" oninput="updateFilter('search', this.value)" />

        ${cities.map(c => `<option ${c===leadsState.city?'selected':''}>${escapeHtml(c)}</option>`).join('')}
      </select>
      <select class="select" onchange="updateFilter('category', this.value)">
        <option value="">Todas categorias</option>
        ${categories.map(c => `<option ${c===leadsState.category?'selected':''}>${escapeHtml(c)}</option>`).join('')}
      </select>
      <select class="select" onchange="updateFilter('status', this.value)">
        <option value="">Todos status</option>
        ${STATUSES.map(s => `<option value="${s.value}" ${s.value===leadsState.status?'selected':''}>${escapeHtml(s.label)}</option>`).join('')}
      </select>
      <select class="select" onchange="updateFilter('sortBy', this.value)">
        <option value="created_at" ${leadsState.sortBy==='created_at'?'selected':''}>Mais recentes</option>
        <option value="score" ${leadsState.sortBy==='score'?'selected':''}>🧠 Maior score (IA)</option>
      </select>

  `;

  let rowsHtml = '';
  if (pageItems.length === 0) {
    rowsHtml = `<tr><td colspan="7"><div class="empty-state"><div class="empty-state-icon">${ICON.empty}</div><div class="empty-state-title">Nenhum lead encontrado</div><div class="empty-state-desc">Tente ajustar os filtros ou rode uma nova busca.</div></div></td></tr>`;
  } else {
    rowsHtml = pageItems.map(l => `
      <tr class="row-clickable" onclick="openLeadDrawer('${l.id}')">
        <td>${renderScorePill(l.last_score)}</td>
        <td>
          <div class="lead-name">${escapeHtml(l.name)}</div>
          <div class="lead-category">${escapeHtml(l.category || '—')}</div>
        </td>
        <td>${escapeHtml(l.city || '—')}${l.state ? ` <span style="color:var(--text-subtle)">· ${escapeHtml(l.state)}</span>` : ''}</td>
        <td class="mono" style="font-size:12.5px">${escapeHtml(fmtPhone(l.phone) || '—')}</td>
        <td>${l.rating ? `<span class="rating-pill">${ICON.star} ${l.rating} <span style="color:var(--text-subtle); font-weight:400">(${l.reviews_count||0})</span></span>` : '—'}</td>
        <td onclick="event.stopPropagation()">
          <select class="status-select" onchange="changeStatus('${l.id}', this.value)" style="color: var(--status-${l.status})">
            ${STATUSES.map(s => `<option value="${s.value}" ${s.value===l.status?'selected':''}>${escapeHtml(s.label)}</option>`).join('')}
          </select>
        </td>
        <td style="color:var(--text-subtle); font-size:12px">${fmtDate(l.created_at)}</td>
      </tr>
    `).join('');
  }

  const content = `
    ${filtersHtml}
    <div class="table-wrapper">
      <table class="table">
        <thead>
          <tr>
            <th style="width: 70px"><span class="ai-badge">IA</span></th>
            <th>Lead</th>
            <th>Cidade</th>
            <th>Telefone</th>
            <th>Rating</th>
            <th>Status</th>
            <th>Adicionado</th>
          </tr>
        </thead>
        <tbody>${rowsHtml}</tbody>
      </table>
      <div class="pagination">
        <div class="pagination-info">${total} ${total === 1 ? 'lead' : 'leads'} · Página ${leadsState.page} de ${totalPages}</div>
        <div class="pagination-controls">
          <button class="btn btn-secondary" ${leadsState.page<=1?'disabled':''} onclick="changePage(${leadsState.page-1})">Anterior</button>
          <button class="btn btn-secondary" ${leadsState.page>=totalPages?'disabled':''} onclick="changePage(${leadsState.page+1})">Próxima</button>
        </div>
      </div>
    </div>
  `;
  document.getElementById('content').innerHTML = content;
}

window.updateFilter = function(key, value) {
  leadsState[key] = value;
  leadsState.page = 1;
  renderLeadsTable();
};

window.changePage = function(p) {
  leadsState.page = p;
  renderLeadsTable();
  document.getElementById('content').scrollTo({ top: 0, behavior: 'smooth' });
};

window.changeStatus = async function(id, status) {
  try {
    await sb('PATCH', `/leads?id=eq.${id}`, { status });
    const lead = leadsCache.find(l => l.id === id);
    if (lead) lead.status = status;
    // Log da mudança
    await sb('POST', '/lead_interactions', {
      lead_id: id,
      type: 'status_change',
      content: `Status alterado para "${statusLabel(status)}"`,
      metadata: { new_status: status },
    });
    toast('Status atualizado', 'success');
    renderLeadsTable();
  } catch (e) {
    toast('Erro ao atualizar: ' + e.message, 'error');
  }
};

   ============================================ */
async function renderKanban() {
  renderLayout('<div class="loading-state"><div class="spinner spinner-lg"></div></div>', 'Pipeline (Kanban)');
  try {
    const leads = await sb('GET', '/leads?select=*&order=updated_at.desc');
    leadsCache = leads;
    drawKanban();
  } catch (e) {
    document.getElementById('content').innerHTML = `<div class="card"><div class="empty-state"><div class="empty-state-title">Erro</div><div class="empty-state-desc">${escapeHtml(e.message)}</div></div></div>`;
  }
}

function drawKanban() {
  const cols = KANBAN_STATUSES.map(status => {
    const items = leadsCache.filter(l => l.status === status);
    const cards = items.map(l => `
      <div class="kanban-card" draggable="true" data-id="${l.id}"
        ondragstart="onDragStart(event)" ondragend="onDragEnd(event)"
        onclick="openLeadDrawer('${l.id}')">
        <div style="display: flex; justify-content: space-between; align-items: start; gap: 8px; margin-bottom: 4px;">
          <div class="kanban-card-name" style="margin-bottom: 0;">${escapeHtml(l.name)}</div>
          ${l.last_score != null ? renderScorePill(l.last_score) : ''}
        </div>
        <div class="kanban-card-meta">
          ${l.city ? `<span>📍 ${escapeHtml(l.city)}</span>` : ''}
          ${l.rating ? `<span>${ICON.star} ${l.rating}</span>` : ''}
          ${l.phone ? `<span class="mono">${escapeHtml(fmtPhone(l.phone))}</span>` : ''}
        </div>
      </div>
    `).join('');
    const labelObj = STATUSES.find(s => s.value === status);
    return `
      <div class="kanban-column">
        <div class="kanban-header">
          <div class="kanban-title" style="color: var(--status-${status})">
            <span class="badge-dot" style="background: var(--status-${status})"></span>
            ${escapeHtml(labelObj.label)}
          </div>
          <div class="kanban-count">${items.length}</div>
        </div>
        <div class="kanban-cards" data-status="${status}"
          ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event)">
          ${cards || '<div style="color: var(--text-subtle); font-size: 12px; padding: 14px; text-align: center;">Vazio</div>'}
        </div>
      </div>
    `;
  }).join('');

  document.getElementById('content').innerHTML = `<div class="kanban">${cols}</div>`;
}

let draggedId = null;
window.onDragStart = function(e) {
  draggedId = e.target.dataset.id;
  e.target.classList.add('dragging');
};
window.onDragEnd = function(e) {
  e.target.classList.remove('dragging');
};
window.onDragOver = function(e) {
  e.preventDefault();
  e.currentTarget.classList.add('drop-target');
};
window.onDragLeave = function(e) {
  e.currentTarget.classList.remove('drop-target');
};
window.onDrop = async function(e) {
  e.preventDefault();
  e.currentTarget.classList.remove('drop-target');
  const newStatus = e.currentTarget.dataset.status;
  if (!draggedId || !newStatus) return;
  try {
    await sb('PATCH', `/leads?id=eq.${draggedId}`, { status: newStatus });
    const lead = leadsCache.find(l => l.id === draggedId);
    if (lead) lead.status = newStatus;
    await sb('POST', '/lead_interactions', {
      lead_id: draggedId,
      type: 'status_change',
      content: `Movido para "${statusLabel(newStatus)}"`,
      metadata: { new_status: newStatus },
    });
    toast('Status atualizado', 'success');
    drawKanban();
  } catch (err) {
    toast('Erro: ' + err.message, 'error');
  }
};

            <div class="slider-value" id="ns-count-val">50</div>
          </div>
          <div class="field-help">Custo Apify: ~U$ 4 por 1.000 leads. 50 leads ≈ U$ 0,20</div>
        </div>
        <button class="btn btn-primary" id="ns-submit" onclick="startSearch()" style="width: 100%; padding: 11px; justify-content: center; margin-top: 8px;">
          Iniciar busca

window.startSearch = async function() {
  const query = document.getElementById('ns-query').value.trim();
  const location = document.getElementById('ns-location').value.trim();
  const maxResults = parseInt(document.getElementById('ns-count').value, 10);
  if (!query || !location) { toast('Preencha termo e localização', 'error'); return; }
  if (!config.webhookUrl) { toast('Configure o webhook do n8n nas Configurações', 'error'); return; }

  const btn = document.getElementById('ns-submit');
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div> Buscando... (pode demorar 1-2min)';

  try {
    const headers = { 'Content-Type': 'application/json' };
    if (config.webhookApiKey) headers['x-api-key'] = config.webhookApiKey;
    const res = await fetch(config.webhookUrl, {
      method: 'POST', headers,
      body: JSON.stringify({ query, location, maxResults }),
    });
    if (!res.ok) throw new Error(`Webhook retornou ${res.status}`);
    const data = await res.json();
    toast(`✓ ${data.leads_imported || 0} leads importados`, 'success');
    document.getElementById('ns-query').value = '';
    document.getElementById('ns-location').value = '';
    await renderNewSearch();
  } catch (e) {
    toast('Erro: ' + e.message, 'error');
  } finally {
    btn.disabled = false;
    btn.innerHTML = 'Iniciar busca';
  }
};

   ============================================ */
let drawerLead = null;
let drawerTab = 'info';

window.openLeadDrawer = async function(id) {
  const root = document.getElementById('drawer-root');
  root.innerHTML = `
    <div class="drawer-overlay open" onclick="closeDrawer()"></div>
    <div class="drawer open">
      <div style="padding: 80px 0; text-align: center;"><div class="spinner spinner-lg"></div></div>
    </div>
  `;
  try {
    const [leads, interactions, enrichments, messages] = await Promise.all([
      sb('GET', `/leads?id=eq.${id}&select=*`),
      sb('GET', `/lead_interactions?lead_id=eq.${id}&select=*&order=created_at.desc`),
      sb('GET', `/lead_enrichments?lead_id=eq.${id}&select=*&order=created_at.desc&limit=1`),
      sb('GET', `/messages?lead_id=eq.${id}&select=*&order=created_at.asc`),
    ]);
    drawerLead = leads[0];
    drawerLead._interactions = interactions || [];
    drawerLead._enrichment = (enrichments || [])[0] || null;
    drawerLead._messages = messages || [];
    drawerLead._editingDraftId = null;
    drawerLead._generating = false;
    drawDrawer();
  } catch (e) {
    toast('Erro: ' + e.message, 'error');
    closeDrawer();
  }
};

window.closeDrawer = function() {
  const root = document.getElementById('drawer-root');
  const drawer = root.querySelector('.drawer');
  const overlay = root.querySelector('.drawer-overlay');
  if (drawer) drawer.classList.remove('open');
  if (overlay) overlay.classList.remove('open');
  setTimeout(() => { root.innerHTML = ''; }, 250);
};

window.switchTab = function(tab) { drawerTab = tab; drawDrawer(); };

  const l = drawerLead;
  if (!l) return;

  let tabContent = '';
  if (drawerTab === 'info') {
    const info = (label, val, isLink) => `
      <div class="info-row">
        <div class="info-label">${escapeHtml(label)}</div>
        <div class="info-value ${val ? '' : 'empty'}">${val ? (isLink ? `<a href="${escapeHtml(val)}" target="_blank" rel="noopener">${escapeHtml(val)} ${ICON.external}</a>` : escapeHtml(val)) : '—'}</div>
      </div>

    tabContent = `
      ${info('Categoria', l.category)}
      ${info('Telefone', fmtPhone(l.phone))}
      ${info('WhatsApp', fmtPhone(l.whatsapp))}
      ${info('Website', l.website, true)}
      ${info('Email', l.email)}

    }
  } else if (drawerTab === 'conversation') {
    const en = l._enrichment;
    const messages = l._messages || [];
    
    // Pega as variantes do generation_id mais recente que ainda tá em draft
    const draftsByGen = {};
    messages.filter(m => m.status === 'draft' && m.generation_id).forEach(m => {
      if (!draftsByGen[m.generation_id]) draftsByGen[m.generation_id] = [];
      draftsByGen[m.generation_id].push(m);
    });
    const latestGenId = Object.keys(draftsByGen).sort((a, b) => {
      const aMax = Math.max(...draftsByGen[a].map(m => new Date(m.created_at).getTime()));
      const bMax = Math.max(...draftsByGen[b].map(m => new Date(m.created_at).getTime()));
      return bMax - aMax;
    })[0];
    const pendingDrafts = latestGenId ? draftsByGen[latestGenId].sort((a, b) => new Date(a.created_at) - new Date(b.created_at)) : [];
    
    // Mensagens "ativas" (aprovadas, enviadas, recebidas) — não-drafts
    const activeMessages = messages.filter(m => !['draft', 'discarded'].includes(m.status))
      .sort((a, b) => new Date(a.created_at) - new Date(b.created_at));
    
    // Estado: tem qualificação? tem score suficiente? tem drafts pendentes? tem conversa ativa?
    const hasQualification = en && en.status === 'completed';
    const scoreOK = hasQualification && en.score >= MIN_SCORE_FOR_OUTREACH;
    const hasGenerating = l._generating;
    
    let header = '';
    
    if (!hasQualification) {
      tabContent = `
        <div style="text-align: center; padding: 30px 20px;">
          <div style="font-size: 16px; font-weight: 700; margin-bottom: 6px;">Qualifique o lead primeiro</div>
          <div style="font-size: 13px; color: var(--text-muted); max-width: 340px; margin: 0 auto 18px;">Pra gerar mensagens personalizadas, a IA precisa primeiro analisar a clínica. Vai na aba Insights e clica em "Qualificar com IA".</div>
          <button class="btn btn-secondary" onclick="switchTab('insights')">Ir para Insights</button>
        </div>
      `;
    } else if (!scoreOK) {
      tabContent = `
        <div style="text-align: center; padding: 30px 20px;">
          <div style="font-size: 16px; font-weight: 700; margin-bottom: 6px;">Score muito baixo pra outreach</div>
          <div style="font-size: 13px; color: var(--text-muted); max-width: 360px; margin: 0 auto 18px;">Esse lead tem score <strong>${en.score}/100</strong>, abaixo do mínimo recomendado (${MIN_SCORE_FOR_OUTREACH}). Mensagens de WhatsApp são limitadas — vale focar em leads de maior potencial primeiro.</div>
          <button class="btn btn-secondary" onclick="generateMessages('${l.id}', true)">Gerar mesmo assim</button>
        </div>
      `;
    } else if (hasGenerating) {
      tabContent = `
        <div style="text-align: center; padding: 50px 20px;">
          <div class="spinner spinner-lg" style="margin-bottom: 14px;"></div>
          <div style="font-size: 14px; font-weight: 600; margin-bottom: 4px;">Gerando 3 variações personalizadas...</div>
          <div style="font-size: 12px; color: var(--text-subtle);">Pode levar uns 15-25 segundos</div>
        </div>
      `;
    } else if (pendingDrafts.length > 0) {
      // MODO: escolher variante
      const editingId = l._editingDraftId;
      const variantsHtml = pendingDrafts.map(d => {
        const isEditing = editingId === d.id;
        return `
          <div class="variant-card">
            <div class="variant-header">
              <span class="variant-label">${escapeHtml(d.variant_label || 'Sem rótulo')}</span>
              <span style="font-size: 11px; color: var(--text-subtle);">${d.tokens_used || 0} tokens</span>
            </div>
            ${isEditing
              ? `<textarea class="variant-message-edit" id="edit-${d.id}">${escapeHtml(d.content)}</textarea>`
              : `<div class="variant-message">${escapeHtml(d.content)}</div>`
            }
            <div class="variant-actions">
              ${isEditing
                ? `<button class="btn btn-primary" onclick="saveEditDraft('${d.id}')">Salvar e Aprovar</button>
                   <button class="btn btn-ghost" onclick="cancelEditDraft()">Cancelar</button>`
                : `<button class="btn btn-primary" onclick="approveDraft('${d.id}', '${l.id}')">✓ Aprovar essa</button>
                   <button class="btn btn-secondary" onclick="editDraft('${d.id}')">Editar</button>
                   <button class="btn btn-ghost" onclick="discardDraft('${d.id}', '${l.id}')">Descartar</button>`
              }
            </div>
          </div>
        `;
      }).join('');
      
      tabContent = `
        <div style="margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center;">
          <div>
            <div style="font-size: 14px; font-weight: 700;">3 variações geradas pela IA</div>
            <div style="font-size: 12px; color: var(--text-subtle);">Escolha a que mais combinar (pode editar antes de aprovar)</div>
          </div>
          <button class="btn btn-ghost" onclick="generateMessages('${l.id}')">↻ Regenerar</button>
        </div>
        ${variantsHtml}
      `;
    } else {
      // MODO: conversa (mostra histórico) ou prompt pra gerar
      if (activeMessages.length === 0) {
        tabContent = `
          <div style="text-align: center; padding: 30px 20px;">
            <div style="width: 56px; height: 56px; margin: 0 auto 14px; background: linear-gradient(135deg, var(--accent) 0%, #A78BFA 100%); border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 28px;">✍️</div>
            <div style="font-size: 16px; font-weight: 700; margin-bottom: 6px;">Pronto pra gerar a primeira mensagem</div>
            <div style="font-size: 13px; color: var(--text-muted); max-width: 360px; margin: 0 auto 18px;">A IA vai criar 3 variações personalizadas usando os insights da Fase 1 (dores, ganchos, abordagem). Você escolhe qual prefere.</div>
            <button class="qualify-btn" onclick="generateMessages('${l.id}')">${ICON.message} Gerar mensagens</button>
          </div>
        `;
      } else {
        // Mostra a conversa
        const bubbles = activeMessages.map(m => {
          const direction = m.direction;
          const statusInfo = ({
            'approved': { label: 'Aguardando envio', cls: 'msg-status-approved' },
            'sending': { label: 'Enviando...', cls: 'msg-status-sent' },
            'sent': { label: 'Enviada', cls: 'msg-status-sent' },
            'delivered': { label: 'Entregue', cls: 'msg-status-delivered' },
            'read': { label: 'Lida', cls: 'msg-status-read' },
            'failed': { label: 'Falhou', cls: 'msg-status-failed' },
            'received': { label: 'Recebida', cls: '' },
          })[m.status] || { label: m.status, cls: '' };
          
          return `
            <div class="chat-bubble ${direction}">
              ${escapeHtml(m.content)}
              <div class="chat-bubble-meta">
                ${m.edited ? '<span title="Editada por humano">✎</span>' : ''}
                ${fmtDate(m.sent_at || m.created_at)}
                ${direction === 'outbound' ? `<span class="msg-status-pill ${statusInfo.cls}">${statusInfo.label}</span>` : ''}
              </div>
            </div>
          `;
        }).join('');
        
        tabContent = `
          <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px;">
            <div style="font-size: 13px; font-weight: 600; color: var(--text-muted);">${activeMessages.length} mensage${activeMessages.length === 1 ? 'm' : 'ns'}</div>
            <button class="btn btn-secondary" onclick="generateMessages('${l.id}')">${ICON.message} Nova mensagem</button>
          </div>
          <div class="chat-container">${bubbles}</div>
        `;
      }
    }
  } else if (drawerTab === 'note') {
    tabContent = `
      <textarea class="textarea" id="note-text" placeholder="Adicione uma nota sobre esse lead, próximos passos, contexto..." style="min-height: 140px;"></textarea>
      <button class="btn btn-primary" onclick="addNote('${l.id}')" style="margin-top: 8px;">Adicionar nota</button>
    `;
  }

  document.getElementById('drawer-root').innerHTML = `
    <div class="drawer-overlay open" onclick="closeDrawer()"></div>
    <div class="drawer open">
      <div class="drawer-header">
        <div style="flex: 1; min-width: 0;">
          <div class="drawer-title">${escapeHtml(l.name)}</div>
          <div style="display: flex; gap: 6px; align-items: center; flex-wrap: wrap;">
            <span class="badge status-${l.status}"><span class="badge-dot"></span>${escapeHtml(statusLabel(l.status))}</span>
            ${l.last_score != null ? renderScorePill(l.last_score) : ''}
          </div>
        </div>
        <button class="drawer-close" onclick="closeDrawer()">${ICON.close}</button>
      </div>
      <div class="drawer-tabs">
        <button class="drawer-tab ${drawerTab==='info'?'active':''}" onclick="switchTab('info')">Informações</button>
        <button class="drawer-tab ${drawerTab==='insights'?'active':''}" onclick="switchTab('insights')">🧠 Insights</button>
        <button class="drawer-tab ${drawerTab==='conversation'?'active':''}" onclick="switchTab('conversation')">📱 Conversa${(l._messages||[]).filter(m => m.status === 'draft').length > 0 ? ` <span style="background: var(--accent); color: white; padding: 1px 6px; border-radius: 999px; font-size: 10px; margin-left: 4px;">${(l._messages||[]).filter(m => m.status === 'draft').length}</span>` : ''}</button>
        <button class="drawer-tab ${drawerTab==='history'?'active':''}" onclick="switchTab('history')">Histórico</button>
        <button class="drawer-tab ${drawerTab==='note'?'active':''}" onclick="switchTab('note')">+ Nota</button>
      </div>
      <div class="drawer-body">${tabContent}</div>
    </div>
  `;
}

window.generateMessages = async function(leadId, force = false) {
  if (!config.generateMsgWebhookUrl) {
    toast('Configure o webhook de geração de mensagens', 'error');
    return;
  }
  
  drawerLead._generating = true;
  drawerTab = 'conversation';
  drawDrawer();
  
  try {
    const headers = { 'Content-Type': 'application/json' };
    if (config.webhookApiKey) headers['x-api-key'] = config.webhookApiKey;
    
    const res = await fetch(config.generateMsgWebhookUrl, {
      method: 'POST', headers,
      body: JSON.stringify({ lead_id: leadId, force }),
    });
    
    if (!res.ok) {
      const errText = await res.text();
      throw new Error(`Webhook ${res.status}: ${errText.slice(0, 200)}`);
    }
    
    const data = await res.json();
    if (!data.success) throw new Error(data.error || 'Falha na geração');
    
    toast(`✓ ${data.variants_generated} variações geradas`, 'success');
    
    // Recarrega messages
    drawerLead._messages = await sb('GET', `/messages?lead_id=eq.${leadId}&select=*&order=created_at.asc`);
    drawerLead._generating = false;
    drawDrawer();
  } catch (e) {
    toast('Erro: ' + e.message, 'error');
    drawerLead._generating = false;
    drawDrawer();
  }
};

window.editDraft = function(draftId) {
  drawerLead._editingDraftId = draftId;
  drawDrawer();
};

window.cancelEditDraft = function() {
  drawerLead._editingDraftId = null;
  drawDrawer();
};

window.saveEditDraft = async function(draftId) {
  const newContent = document.getElementById(`edit-${draftId}`).value.trim();
  if (!newContent) { toast('Mensagem vazia', 'error'); return; }
  
  try {
    // Aprova o draft editado
    await sb('PATCH', `/messages?id=eq.${draftId}`, {
      content: newContent,
      status: 'approved',
      edited: true,
      approved_at: new Date().toISOString()
    });
    
    // Descarta as outras variantes do mesmo generation_id
    const draft = drawerLead._messages.find(m => m.id === draftId);
    if (draft && draft.generation_id) {
      await sb('PATCH', `/messages?generation_id=eq.${draft.generation_id}&id=neq.${draftId}&status=eq.draft`, {
        status: 'discarded'
      });
    }
    
    toast('Mensagem aprovada e editada', 'success');
    
    // Recarrega
    drawerLead._messages = await sb('GET', `/messages?lead_id=eq.${drawerLead.id}&select=*&order=created_at.asc`);
    drawerLead._editingDraftId = null;
    drawDrawer();
  } catch (e) {
    toast('Erro: ' + e.message, 'error');
  }
};

window.approveDraft = async function(draftId, leadId) {
  try {
    await sb('PATCH', `/messages?id=eq.${draftId}`, {
      status: 'approved',
      approved_at: new Date().toISOString()
    });
    
    // Descarta as outras variantes do mesmo generation_id
    const draft = drawerLead._messages.find(m => m.id === draftId);
    if (draft && draft.generation_id) {
      await sb('PATCH', `/messages?generation_id=eq.${draft.generation_id}&id=neq.${draftId}&status=eq.draft`, {
        status: 'discarded'
      });
    }
    
    toast('Mensagem aprovada — pronta pro envio', 'success');
    
    drawerLead._messages = await sb('GET', `/messages?lead_id=eq.${leadId}&select=*&order=created_at.asc`);
    drawDrawer();
    refreshApprovalBadge();
  } catch (e) {
    toast('Erro: ' + e.message, 'error');
  }
};

window.discardDraft = async function(draftId, leadId) {
  if (!confirm('Descartar essa variação?')) return;
  try {
    await sb('PATCH', `/messages?id=eq.${draftId}`, { status: 'discarded' });
    drawerLead._messages = await sb('GET', `/messages?lead_id=eq.${leadId}&select=*&order=created_at.asc`);
    drawDrawer();
  } catch (e) {
    toast('Erro: ' + e.message, 'error');
  }
};

async function refreshApprovalBadge() {
  try {
    const drafts = await sb('GET', `/messages?status=eq.draft&select=id`);
    const badge = document.getElementById('approval-count-badge');
    if (badge) {
      if (drafts.length > 0) {
        badge.style.display = 'inline-block';
        badge.textContent = drafts.length;
      } else {
        badge.style.display = 'none';
      }
    }
  } catch (e) { /* silent */ }
}

window.qualifyLead = async function(leadId) {
  if (!config.qualifyWebhookUrl) {
    toast('Configure o webhook de qualificação nas Configurações', 'error');
    return;
  }
  try {
    drawerLead._enrichment = { status: 'processing', lead_id: leadId };
    drawerTab = 'insights';
    drawDrawer();

    const headers = { 'Content-Type': 'application/json' };
    if (config.webhookApiKey) headers['x-api-key'] = config.webhookApiKey;

    const res = await fetch(config.qualifyWebhookUrl, {
      method: 'POST', headers,
      body: JSON.stringify({ lead_id: leadId }),
    });

    if (!res.ok) {
      const errText = await res.text();
      throw new Error(`Webhook ${res.status}: ${errText.slice(0, 200)}`);
    }

    const data = await res.json();
    if (!data.success) throw new Error(data.error || 'Falha na qualificação');

    toast(`✓ Qualificado! Score: ${data.score}/100`, 'success');

    const [leads, enrichments] = await Promise.all([
      sb('GET', `/leads?id=eq.${leadId}&select=*`),
      sb('GET', `/lead_enrichments?lead_id=eq.${leadId}&select=*&order=created_at.desc&limit=1`),
    ]);
    drawerLead = leads[0];
    drawerLead._enrichment = enrichments[0] || null;
    drawerLead._interactions = await sb('GET', `/lead_interactions?lead_id=eq.${leadId}&select=*&order=created_at.desc`);

    const cached = leadsCache.find(x => x.id === leadId);
    if (cached) {
      cached.last_score = drawerLead.last_score;
      cached.last_qualified_at = drawerLead.last_qualified_at;
    }

    drawDrawer();
  } catch (e) {
    toast('Erro: ' + e.message, 'error');
    drawerLead._enrichment = { status: 'failed', error_message: e.message, lead_id: leadId };
    drawDrawer();
  }
};

window.addNote = async function(id) {
  const text = document.getElementById('note-text').value.trim();
  if (!text) { toast('Escreva alguma coisa', 'error'); return; }
  try {
    await sb('POST', '/lead_interactions', { lead_id: id, type: 'note', content: text });
    toast('Nota adicionada', 'success');
    drawerLead._interactions = await sb('GET', `/lead_interactions?lead_id=eq.${id}&select=*&order=created_at.desc`);
    drawerTab = 'history';
    drawDrawer();
  } catch (e) {
    toast('Erro: ' + e.message, 'error');
  }
};

/* ============================================
   ROUTER / RENDER
   ============================================ */
async function renderApproval() {
  renderLayout('<div class="loading-state"><div class="spinner spinner-lg"></div></div>', 'Aprovação de Mensagens');
  
  try {
    // Busca todos os drafts agrupados por lead
    const drafts = await sb('GET', '/messages?status=eq.draft&select=*&order=created_at.desc');
    
    if (drafts.length === 0) {
      document.getElementById('content').innerHTML = `
        <div class="card">
          <div class="empty-state">
            <div class="empty-state-icon">${ICON.inbox}</div>
            <div class="empty-state-title">Inbox vazio</div>
            <div class="empty-state-desc">Nenhuma mensagem aguardando aprovação. Vá em Leads → abra um lead qualificado → Conversa → Gerar mensagens.</div>
          </div>
        </div>
      `;
      return;
    }
    
    // Agrupa por generation_id (cada generation = 1 set de variantes pra 1 lead)
    const byGen = {};
    drafts.forEach(d => {
      const key = d.generation_id || d.id;
      if (!byGen[key]) byGen[key] = { lead_id: d.lead_id, variants: [], created_at: d.created_at };
      byGen[key].variants.push(d);
    });
    
    // Busca os leads referenciados
    const leadIds = [...new Set(Object.values(byGen).map(g => g.lead_id))];
    const leadsData = leadIds.length > 0 
      ? await sb('GET', `/leads?id=in.(${leadIds.join(',')})&select=id,name,city,category,phone,last_score`)
      : [];
    const leadMap = Object.fromEntries(leadsData.map(l => [l.id, l]));
    
    const cards = Object.values(byGen)
      .sort((a, b) => new Date(b.created_at) - new Date(a.created_at))
      .map(gen => {
        const lead = leadMap[gen.lead_id];
        if (!lead) return '';
        
        const variantsHtml = gen.variants.map(v => `
          <div class="variant-card" style="margin-bottom: 0;">
            <div class="variant-header">
              <span class="variant-label">${escapeHtml(v.variant_label || 'Sem rótulo')}</span>
            </div>
            <div class="variant-message">${escapeHtml(v.content)}</div>
            <div class="variant-actions">
              <button class="btn btn-primary" onclick="quickApprove('${v.id}', '${gen.lead_id}')">✓ Aprovar</button>
              <button class="btn btn-secondary" onclick="openLeadDrawer('${gen.lead_id}')">Abrir lead</button>
              <button class="btn btn-ghost" onclick="quickDiscard('${v.id}')">Descartar</button>
            </div>
          </div>
        `).join('');
        
        return `
          <div class="approval-card">
            <div class="approval-card-header">
              <div>
                <div class="approval-card-title">${escapeHtml(lead.name)}</div>
                <div class="approval-card-meta">
                  ${lead.last_score != null ? renderScorePill(lead.last_score) : ''}
                  ${lead.category ? `<span>${escapeHtml(lead.category)}</span>` : ''}
                  ${lead.city ? `<span>📍 ${escapeHtml(lead.city)}</span>` : ''}
                  ${lead.phone ? `<span class="mono">${escapeHtml(fmtPhone(lead.phone))}</span>` : ''}
                  <span style="color: var(--text-subtle);">· Gerado ${fmtDate(gen.created_at)}</span>
                </div>
              </div>
            </div>
            <div class="approval-variants-grid">${variantsHtml}</div>
          </div>
        `;
      }).join('');
    
    document.getElementById('content').innerHTML = `
      <div style="margin-bottom: 16px; color: var(--text-muted); font-size: 13px;">
        ${drafts.length} mensage${drafts.length === 1 ? 'm' : 'ns'} aguardando aprovação · ${Object.keys(byGen).length} ${Object.keys(byGen).length === 1 ? 'lead' : 'leads'}
      </div>
      ${cards}
    `;
  } catch (e) {
    document.getElementById('content').innerHTML = `<div class="card"><div class="empty-state"><div class="empty-state-title">Erro</div><div class="empty-state-desc">${escapeHtml(e.message)}</div></div></div>`;
  }
}

window.quickApprove = async function(draftId, leadId) {
  try {
    await sb('PATCH', `/messages?id=eq.${draftId}`, {
      status: 'approved',
      approved_at: new Date().toISOString()
    });
    // Descarta as outras variantes do mesmo generation_id
    const allDrafts = await sb('GET', `/messages?id=eq.${draftId}&select=generation_id`);
    if (allDrafts[0]?.generation_id) {
      await sb('PATCH', `/messages?generation_id=eq.${allDrafts[0].generation_id}&id=neq.${draftId}&status=eq.draft`, {
        status: 'discarded'
      });
    }
    toast('Aprovada!', 'success');
    renderApproval();
    refreshApprovalBadge();
  } catch (e) {
    toast('Erro: ' + e.message, 'error');
  }
};

window.quickDiscard = async function(draftId) {
  try {
    await sb('PATCH', `/messages?id=eq.${draftId}`, { status: 'discarded' });
    renderApproval();
    refreshApprovalBadge();
  } catch (e) {
    toast('Erro: ' + e.message, 'error');
  }
};

function render() {
  if (!config) { renderSetup(); return; }
  const hash = window.location.hash.slice(1) || 'dashboard';
  currentRoute = hash;
  if (hash === 'dashboard') renderDashboard();
  else if (hash === 'leads') renderLeads();
  else if (hash === 'kanban') renderKanban();
  else if (hash === 'nova-busca') renderNewSearch();
  else if (hash === 'aprovacao') renderApproval();
  else if (hash === 'config') renderSettings();
  else renderDashboard();
  
  // Atualiza badge de aprovação em background
  refreshApprovalBadge();
}

// Boot
render();
// Atualiza badge a cada 30s pra detectar novos drafts
setInterval(refreshApprovalBadge, 30000);
</script>
